{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h2>System Login</h2>
    <div class="form-box">
        {% if form.errors %}
            <div class="alert-danger">Invalid username or password.</div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-row">
                <label>Username</label>
                <input type="text" name="username" class="form-input" required>
            </div>
            <div class="form-row">
                <label>Password</label>
                <input type="password" name="password" class="form-input" required>
            </div>
            <button type="submit" class="btn-save" style="background: #23395d;">Login to Dashboard</button>
        </form>
    </div>
</div>
{% endblock %}
